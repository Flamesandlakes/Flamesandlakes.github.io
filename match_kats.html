<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Game</title>
    <style>
        body {
            background-color: darkslategray;
           
        }

        .game-board {

            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            padding: 1rem;
            justify-content: center;
            align-content: center;

        }

        .player-pile {
            border: 2px solid #ccc;
            border-radius: 2px;
            padding: 2rem;
            min-width: 22rem; /*25rem; /*150px;*/
            min-height: 16rem; /*18rem; /*200px;*/
        }

        .card {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-color: beige;
            border-radius: 5px;
            border: 2px solid transparent;
            padding-top: 0.9rem;
            text-align: center;
            cursor: pointer;
            position: relative;

            flex-basis: 20%;
            flex-grow: 1;
        }
        .empty {
            background-color: transparent;
        }

        .highlighted {
            border: 0.2rem solid gold;
            background-color: gold;
        }

        .highlighted-border {
            border: 0.9rem solid gold;
            background-color: gold;
        }

        .button-container {
            /*padding-left: clamp(1rem, 40vw, 50rem);*/
            
            place-items: center;

        }

        .supplementary-button {
            margin: 1rem;
            padding: 0.5rem 1.2rem;
            font-size: 1.2rem;
            cursor: pointer;
            justify-content: center;
        } 

        #drawCardButton, #drawCardButton2, #drawCardAllButton {
            margin: 1.3rem;
            padding: 0.6rem 1.3rem;
            font-size: 1.4rem;
            cursor: pointer;
            justify-content: center;
        }
    </style>
</head>
<body>
    <center>
    <div class = "button-container">
    <button id="drawCardButton">Draw Card</button>
    <button id="drawCardAllButton">Draw Cards to All</button>
    </div>
    </center>
    <div class="game-board" id="gameBoard">
        <!-- Player piles will be dynamically added here -->
    </div>
     <center>
    <div class = "button-container">
    <button id="drawCardButton2">Draw Card</button>     
    </div> </center>
    <br><br>
     <center>
    <div class = "button-container">
        <button id="removePlayerButton" class="supplementary-button">Remove a Player</button>
        <button id="addPlayerButton" class="supplementary-button">Add a Player</button>

    </div></center>
     <center>
    <div class = "button-container">
        <button id="resetButton" class="supplementary-button">Reset the Board</button>
        <button id="switchLangButton" class="supplementary-button">Switch Language (+ Reset)</button>

    </div></center>
      
    <script src="MatchKatsGame.js"></script>
</body>
</html>
