<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unique Item Assignment</title>
    <link rel="stylesheet" href="css/assigner_layout.css">
</head>
<body>
    <div class="container">
        <h1>Assigner of Item Sets</h1>

        <!-- Player Color Selection -->
        <div class="section">
            <h2>Select Player Colors</h2>
            <div class="color-options">
                <label><input type="checkbox" name="player-color" value="Blue"> Blue</label>
                <label><input type="checkbox" name="player-color" value="Green"> Green</label>
                <label><input type="checkbox" name="player-color" value="Orange"> Orange</label>
                <label><input type="checkbox" name="player-color" value="Purple"> Purple</label>
                <label><input type="checkbox" name="player-color" value="Pink"> Pink</label>
                <label><input type="checkbox" name="player-color" value="Black"> Black</label>
                <label><input type="checkbox" name="player-color" value="White"> White</label>
                <label><input type="checkbox" name="player-color" value="Gray"> Gray</label>
                <label><input type="checkbox" name="player-color" value="Brown"> Brown</label>
                <label><input type="checkbox" name="player-color" value="Red"> Red</label>
                <label><input type="checkbox" name="player-color" value="Yellow"> Yellow</label>
                <label><input type="checkbox" name="player-color" value="Light_green"> Light Green</label>
            </div>
        </div>

        <!-- Player Name Assignment -->
        <div class="section">
            <h2>Assign Player Names</h2>
            <div id="player-names-container" class="player-names-container"></div>
        </div>

        <!-- Stage Items -->
        <div class="section">
            <h2>Add Items for Each Stage</h2>
            <div class="stages-container">
                <div class="stage">
                    <h3>Stage 1</h3>
                    <div class="item-input">
                        <input type="text" id="stage1-input" placeholder="Add an item">
                        <button onclick="addItem(1)">Add</button>
                    </div>
                    <ul id="stage1-items"></ul>
                </div>
                <div class="stage">
                    <h3>Stage 2</h3>
                    <div class="item-input">
                        <input type="text" id="stage2-input" placeholder="Add an item">
                        <button onclick="addItem(2)">Add</button>
                    </div>
                    <ul id="stage2-items"></ul>
                </div>
                <div class="stage">
                    <h3>Stage 3</h3>
                    <div class="item-input">
                        <input type="text" id="stage3-input" placeholder="Add an item">
                        <button onclick="addItem(3)">Add</button>
                    </div>
                    <ul id="stage3-items"></ul>
                </div>
            </div>
        </div>

        <!-- Assign Button -->
        <button id="assign-button" onclick="assignItems()">Assign Items</button>

        <!-- Results Table -->
        <div class="section">
            <h2>Assignment Results</h2>
            <div id="results-table-container"></div>
        </div>
    </div>

    <script src="js_scripts/itemAssignment.js"></script>
</body>
</html>
